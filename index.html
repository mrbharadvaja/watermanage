<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BP Water Inventory Management Dashboard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bp: {
                            blue: '#1f4e79',
                            dark: '#13324d',
                            light: '#f4f7f9'
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- React & ReactDOM -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- Prop-types & Recharts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>

    <!-- Firebase Imports -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.firebaseAPI = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, doc, setDoc, onSnapshot, collection };
    </script>

    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f1f5f9; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .ai-shimmer {
            animation: shimmer 2s infinite linear;
            background: linear-gradient(to right, #f8fafc 4%, #e2e8f0 25%, #f8fafc 36%);
            background-size: 1000px 100%;
        }
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }
        .dark-scrollbar::-webkit-scrollbar { width: 6px; }
        .dark-scrollbar::-webkit-scrollbar-track { background: #1e293b; border-radius: 4px; }
        .dark-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        .dark-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        const { 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, 
            AreaChart, Area, ReferenceLine, PieChart, Pie, Cell, ComposedChart, LabelList
        } = Recharts;

        // --- Utility ---
        const formatDate = (date) => {
            const d = new Date(date);
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        const displayDate = (dateStr) => {
            return new Date(dateStr).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        };

        const shortDate = (dateStr) => {
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr; 
            return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        };

        // --- Gemini API Logic ---
        const callGemini = async (prompt, retries = 0) => {
            const apiKey = ""; 
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { 
                    parts: [{ 
                        text: "You are a Senior Operations Data Scientist for a BP Oil & Gas workforce camp. Provide brief, highly professional, executive-level insights based on the provided water inventory data. Focus on operational readiness and risks." 
                    }] 
                }
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const result = await response.json();
                return result.candidates?.[0]?.content?.parts?.[0]?.text || "No insights generated.";
            } catch (error) {
                if (retries < 5) {
                    const delay = Math.pow(2, retries) * 1000;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    return callGemini(prompt, retries + 1);
                }
                throw new Error("Failed to generate AI insights after multiple attempts.");
            }
        };

        // --- Icons ---
        const IconBox = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>;
        const IconDroplet = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 2.69l5.74 5.88a9.81 9.81 0 1 1-13.91 0L12 2.69z"/></svg>;
        const IconTruck = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>;
        const IconCalendar = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
        const IconChevronLeft = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg>;
        const IconChevronRight = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"></polyline></svg>;
        const IconSparkles = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 3l1.912 5.813a2 2 0 001.275 1.275L21 12l-5.813 1.912a2 2 0 00-1.275 1.275L12 21l-1.912-5.813a2 2 0 00-1.275-1.275L3 12l5.813-1.912a2 2 0 001.275-1.275L12 3z"/></svg>;
        const IconSettings = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;
        const IconSave = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>;

        // --- Default Data Reference ---
        const defaultDailyUseData = [
            { id: 'd1', date: '2026-03-29', val: 234 },
            { id: 'd2', date: '2026-03-30', val: 113 },
            { id: 'd3', date: '2026-03-31', val: 428 },
            { id: 'd4', date: '2026-04-01', val: 283 },
            { id: 'd5', date: '2026-04-02', val: 90 },
        ];
        const LOCAL_STORAGE_KEY = 'bp_water_dashboard_data_v2';

        // --- App Component ---
        function App() {
            // Check if we are running locally without the injected environment variables
            const isLocalEnvironment = typeof __firebase_config === 'undefined';

            // Firebase Setup
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            const [saveStatus, setSaveStatus] = useState("idle");

            // Setup Base State
            const [baseDateStr] = useState('2026-03-29');
            const [selectedDateStr, setSelectedDateStr] = useState('2026-04-02');
            
            // Editable Operations Parameters
            const [baseStock, setBaseStock] = useState(3725);
            const [scenario, setScenario] = useState('2.31L'); 
            const [dailyConsumption, setDailyConsumption] = useState(213); 
            
            const [shipments, setShipments] = useState([
                { id: 1, date: '2026-03-30', volume: 3000 }, 
                { id: 2, date: '2026-04-07', volume: 7800 }, 
                { id: 3, date: '2026-04-08', volume: 10800 }, 
            ]);

            const [actualDailyUseDataState, setActualDailyUseData] = useState(defaultDailyUseData);

            const [aiInsights, setAiInsights] = useState("");
            const [isGeneratingAI, setIsGeneratingAI] = useState(false);
            const [aiError, setAiError] = useState("");

            // --- Load Data & Firebase Initialization ---
            useEffect(() => {
                const localData = localStorage.getItem(LOCAL_STORAGE_KEY);
                if (localData) {
                    try {
                        const data = JSON.parse(localData);
                        if(data.baseStock !== undefined) setBaseStock(data.baseStock);
                        if(data.dailyConsumption !== undefined) setDailyConsumption(data.dailyConsumption);
                        if(data.scenario) setScenario(data.scenario);
                        if(data.shipments && data.shipments.length) setShipments(data.shipments);
                        if(data.actualData && data.actualData.length) setActualDailyUseData(data.actualData);
                    } catch(e) {
                        console.error("Local storage parse error", e);
                    }
                }

                let unsubscribeAuth;
                let unsubscribeData;

                const initFirebase = async () => {
                    if (isLocalEnvironment || !window.firebaseAPI) return;
                    const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore, doc, onSnapshot } = window.firebaseAPI;
                    
                    const config = JSON.parse(__firebase_config);
                    const app = initializeApp(config);
                    const auth = getAuth(app);
                    const firestoreDb = getFirestore(app);
                    setDb(firestoreDb);

                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token).catch(console.error);
                    } else {
                        await signInAnonymously(auth).catch(console.error);
                    }

                    unsubscribeAuth = onAuthStateChanged(auth, (currentUser) => {
                        setUser(currentUser);
                        if (currentUser) {
                            const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                            const docRef = doc(firestoreDb, 'artifacts', appId, 'users', currentUser.uid, 'settings', 'dashboardConfig');
                            
                            unsubscribeData = onSnapshot(docRef, (docSnap) => {
                                if (docSnap.exists()) {
                                    const data = docSnap.data();
                                    if(data.baseStock !== undefined) setBaseStock(data.baseStock);
                                    if(data.dailyConsumption !== undefined) setDailyConsumption(data.dailyConsumption);
                                    if(data.scenario) setScenario(data.scenario);
                                    if(data.shipments && data.shipments.length) setShipments(data.shipments);
                                    if(data.actualData && data.actualData.length) setActualDailyUseData(data.actualData);
                                }
                            }, (err) => console.error("Snapshot error:", err));
                        }
                    });
                };
                
                setTimeout(initFirebase, 500);

                return () => {
                    if (unsubscribeAuth) unsubscribeAuth();
                    if (unsubscribeData) unsubscribeData();
                };
            }, [isLocalEnvironment]);

            // --- Save Configuration (Locally + Cloud) ---
            const handleSaveData = async () => {
                setSaveStatus("saving");
                
                const dataToSave = {
                    baseStock: parseInt(baseStock),
                    dailyConsumption: parseInt(dailyConsumption),
                    scenario,
                    shipments,
                    actualData: actualDailyUseDataState,
                    lastUpdated: new Date().toISOString()
                };

                try {
                    localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(dataToSave));
                } catch (e) {
                    console.error("Failed to save to local storage", e);
                }

                if (isLocalEnvironment || !user || !db) {
                    setSaveStatus("saved");
                    setTimeout(() => setSaveStatus("idle"), 3000);
                    return;
                }
                
                try {
                    const { doc, setDoc } = window.firebaseAPI;
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                    const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'dashboardConfig');
                    
                    await setDoc(docRef, dataToSave);
                    setSaveStatus("saved");
                    setTimeout(() => setSaveStatus("idle"), 3000);
                } catch (error) {
                    console.error("Error saving doc", error);
                    setSaveStatus("saved");
                    setTimeout(() => setSaveStatus("idle"), 3000);
                }
            };

            // --- Scenario Handlers ---
            const handleScenarioChange = (type) => {
                setScenario(type);
                if (type === '2.31L') setDailyConsumption(213);
                if (type === '2.5L') setDailyConsumption(230);
                if (type === '3.5L') setDailyConsumption(322);
                if (type === '5L') setDailyConsumption(461);
            };

            const handleCustomConsumptionChange = (val) => {
                const numVal = parseInt(val) || 0;
                setDailyConsumption(numVal);
                if (numVal === 213) setScenario('2.31L');
                else if (numVal === 230) setScenario('2.5L');
                else if (numVal === 322) setScenario('3.5L');
                else if (numVal === 461) setScenario('5L');
                else setScenario('Custom');
            };

            // --- Core Engine: Blend Actuals and Forecast Standards ---
            const forecastData = useMemo(() => {
                let currentStock = parseInt(baseStock) || 0;
                let data = [];
                let runningDate = new Date(baseDateStr);
                const stdConsumption = parseInt(dailyConsumption) || 0;

                for (let i = 0; i <= 60; i++) {
                    let dStr = formatDate(runningDate);
                    
                    // Add Incoming Shipments
                    let shipmentVol = shipments.filter(s => s.date === dStr).reduce((acc, s) => acc + (parseInt(s.volume)||0), 0);
                    currentStock += shipmentVol;
                    
                    // Check if we have actual data for this day, otherwise use Standard
                    let actualObj = actualDailyUseDataState.find(a => a.date === dStr);
                    let appliedConsumption = stdConsumption;
                    
                    if (actualObj && actualObj.val !== null && actualObj.val !== '') {
                        appliedConsumption = parseInt(actualObj.val);
                    }

                    // Subtract consumption to get END of day stock
                    currentStock -= appliedConsumption;
                    
                    const cover = stdConsumption > 0 ? (currentStock / stdConsumption) : 0;

                    data.push({
                        dateObj: new Date(runningDate),
                        dateStr: dStr,
                        label: shortDate(dStr),
                        stock: currentStock, // Ending Stock
                        consumption: appliedConsumption,
                        isActual: !!actualObj,
                        shipment: shipmentVol,
                        daysCover: cover
                    });

                    runningDate.setDate(runningDate.getDate() + 1);
                }
                return data;
            }, [baseDateStr, baseStock, dailyConsumption, shipments, actualDailyUseDataState]);

            // --- Derived State for Currently Selected Date ---
            const currentDayState = useMemo(() => {
                return forecastData.find(d => d.dateStr === selectedDateStr) || forecastData[0];
            }, [selectedDateStr, forecastData]);

            // Navigation Handlers
            const handlePrevDay = () => {
                const d = new Date(selectedDateStr);
                d.setDate(d.getDate() - 1);
                if (d >= new Date(baseDateStr)) {
                    setSelectedDateStr(formatDate(d));
                    setAiInsights(""); 
                }
            };

            const handleNextDay = () => {
                const d = new Date(selectedDateStr);
                d.setDate(d.getDate() + 1);
                const maxDate = new Date(baseDateStr);
                maxDate.setDate(maxDate.getDate() + 60);
                if (d <= maxDate) {
                    setSelectedDateStr(formatDate(d));
                    setAiInsights(""); 
                }
            };

            const handleActualUsageChange = (index, value) => {
                const newData = [...actualDailyUseDataState];
                newData[index].val = value;
                setActualDailyUseData(newData);
            };

            const handleActualUsageDateChange = (index, value) => {
                const newData = [...actualDailyUseDataState];
                newData[index].date = value;
                setActualDailyUseData(newData);
            };

            const handleAddActualUsage = () => {
                setActualDailyUseData([...actualDailyUseDataState, { id: 'd' + Date.now(), date: formatDate(new Date()), val: 0 }]);
            };

            const handleRemoveActualUsage = (index) => {
                const newData = [...actualDailyUseDataState];
                newData.splice(index, 1);
                setActualDailyUseData(newData);
            };

            // Calculate BP Risk Colors
            const getRiskLevel = (days) => {
                if (days > 60) return { text: 'text-green-600', bg: 'bg-green-100', border: 'border-green-500', hex: '#16a34a', label: 'Healthy' };
                if (days >= 45) return { text: 'text-yellow-600', bg: 'bg-yellow-100', border: 'border-yellow-500', hex: '#ca8a04', label: 'Warning' };
                return { text: 'text-red-600', bg: 'bg-red-100', border: 'border-red-500', hex: '#dc2626', label: 'Critical' };
            };
            
            const currentDaysCoverSafe = isNaN(currentDayState?.daysCover) ? 0 : currentDayState.daysCover;
            const currentRisk = getRiskLevel(currentDaysCoverSafe);

            // Calculate Timeline Stages dynamically
            const timelineStages = useMemo(() => {
                let stages = [];
                let sortedShipments = [...shipments].sort((a,b) => new Date(a.date) - new Date(b.date));
                
                sortedShipments.forEach((shipment, index) => {
                    const shipmentDayData = forecastData.find(d => d.dateStr === shipment.date);
                    if (!shipmentDayData) return;

                    let prevDateStr = index === 0 ? baseDateStr : sortedShipments[index-1].date;
                    let currDateObj = new Date(shipment.date);
                    
                    let consumedPeriod = 0;
                    let d = new Date(prevDateStr);
                    // Accurately sum the consumption (actual or forecast) between the shipments
                    while(d < currDateObj) {
                        let fd = forecastData.find(x => x.dateStr === formatDate(d));
                        if(fd) consumedPeriod += fd.consumption;
                        d.setDate(d.getDate() + 1);
                    }
                    
                    let gapDays = Math.round((new Date(shipment.date) - new Date(prevDateStr)) / (1000 * 60 * 60 * 24));
                    let stockBefore = shipmentDayData.stock - shipment.volume; // Because shipmentDayData.stock already has shipment added
                    
                    stages.push({
                        id: index + 1,
                        date: shipment.date,
                        volume: shipment.volume,
                        gapDays: gapDays,
                        consumedPeriod: consumedPeriod,
                        stockBefore: stockBefore,
                        stockAfter: shipmentDayData.stock,
                        newDaysCover: shipmentDayData.daysCover
                    });
                });
                return stages;
            }, [shipments, forecastData, baseDateStr]);

            // --- AI Generation Handler ---
            const handleGenerateAI = async () => {
                setIsGeneratingAI(true);
                setAiError("");
                
                const upcomingShipmentsStr = timelineStages
                    .filter(s => new Date(s.date) >= new Date(selectedDateStr))
                    .map(s => `${shortDate(s.date)} (+${s.volume} galons)`)
                    .join(', ');

                const scenarioName = scenario === 'Custom' ? 'Custom Setup' : `${scenario} Liters/POB/day`;

                const prompt = `Analyze the following water inventory data for an Oil & Gas workforce camp and provide a concise, professional 3-sentence executive summary. Focus heavily on operational readiness, days of cover, and any risks.
                Simulation Date: ${displayDate(selectedDateStr)}
                Current Usable Stock: ${Math.floor(currentDayState.stock)} Galons (19L each)
                Operating Scenario: ${scenarioName}
                Daily Standard Consumption: ${dailyConsumption} Galons/day
                Remaining Days Coverage: ${Math.floor(currentDaysCoverSafe)} days
                Upcoming Shipments: ${upcomingShipmentsStr || 'None scheduled'}`;

                try {
                    const text = await callGemini(prompt);
                    setAiInsights(text);
                } catch (err) {
                    setAiError("AI Error: Could not generate insights. Please try again later. Ensure API key is configured if running locally.");
                } finally {
                    setIsGeneratingAI(false);
                }
            };

            return (
                <div className="min-h-screen bg-slate-100 font-sans text-slate-800 pb-12">
                    {/* Top Navigation Bar */}
                    <div className="bg-bp-blue text-white shadow-md relative z-10">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div>
                                <h1 className="text-2xl font-bold tracking-wide uppercase">Water Inventory Management</h1>
                                <p className="text-blue-200 text-sm mt-1">Site: NEC – COMCON – PHOENIX | Operations Forecast Mode (1 Galon = 19L)</p>
                            </div>
                            
                            {/* Date Navigation Feature */}
                            <div className="flex items-center bg-bp-dark rounded-lg p-1 border border-blue-800 shadow-inner">
                                <button onClick={handlePrevDay} disabled={selectedDateStr === baseDateStr} className="p-2 hover:bg-bp-blue rounded text-white disabled:opacity-50 transition-colors">
                                    <IconChevronLeft className="w-5 h-5" />
                                </button>
                                <div className="px-6 text-center min-w-[180px]">
                                    <p className="text-xs text-blue-300 uppercase font-bold tracking-wider">Current Simulator Date</p>
                                    <p className="text-lg font-bold text-white">{displayDate(selectedDateStr)}</p>
                                </div>
                                <button onClick={handleNextDay} className="p-2 hover:bg-bp-blue rounded text-white transition-colors">
                                    <IconChevronRight className="w-5 h-5" />
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto px-4 mt-6 space-y-6">
                        
                        {/* SECTION: Scenario Selector Toggle */}
                        <div className="bg-white rounded-lg p-2 flex flex-col xl:flex-row items-center justify-between gap-4 shadow-sm border border-slate-200">
                            <div className="flex flex-col md:flex-row w-full items-center gap-4">
                                <div className="flex items-center gap-2 px-3 text-slate-600 font-bold text-sm uppercase tracking-wide whitespace-nowrap">
                                    <IconSettings className="w-5 h-5" /> Active Scenario:
                                </div>
                                <div className="flex flex-wrap bg-slate-100 p-1 rounded-md w-full">
                                    <button 
                                        onClick={() => handleScenarioChange('2.31L')}
                                        className={`flex-1 px-3 py-2 text-xs md:text-sm font-bold rounded transition-all ${scenario === '2.31L' ? 'bg-white text-bp-blue shadow border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}
                                    >
                                        2.31L/POB (213 Gal)
                                    </button>
                                    <button 
                                        onClick={() => handleScenarioChange('2.5L')}
                                        className={`flex-1 px-3 py-2 text-xs md:text-sm font-bold rounded transition-all ${scenario === '2.5L' ? 'bg-white text-bp-blue shadow border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}
                                    >
                                        2.5L/POB (230 Gal)
                                    </button>
                                    <button 
                                        onClick={() => handleScenarioChange('3.5L')}
                                        className={`flex-1 px-3 py-2 text-xs md:text-sm font-bold rounded transition-all ${scenario === '3.5L' ? 'bg-white text-bp-blue shadow border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}
                                    >
                                        3.5L/POB (322 Gal)
                                    </button>
                                    <button 
                                        onClick={() => handleScenarioChange('5L')}
                                        className={`flex-1 px-3 py-2 text-xs md:text-sm font-bold rounded transition-all ${scenario === '5L' ? 'bg-white text-bp-blue shadow border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}
                                    >
                                        5L/POB (461 Gal)
                                    </button>
                                    {scenario === 'Custom' && (
                                        <button className="flex-1 px-3 py-2 text-xs md:text-sm font-bold rounded transition-all bg-white text-bp-blue shadow border border-slate-200">
                                            Custom ({dailyConsumption} Gal)
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* SECTION: KPI Cards */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                            <div className="bg-white rounded-lg p-5 border-t-4 border-t-bp-blue shadow-sm">
                                <div className="flex justify-between items-start">
                                    <div>
                                        <p className="text-xs font-bold text-slate-400 uppercase tracking-wider">Current Usable Stock</p>
                                        <h3 className="text-3xl font-black text-slate-800 mt-1">{Math.floor(currentDayState.stock).toLocaleString()} <span className="text-sm font-semibold text-slate-500">Galons</span></h3>
                                    </div>
                                    <div className="bg-blue-50 p-3 rounded-lg"><IconBox className="w-6 h-6 text-bp-blue" /></div>
                                </div>
                                <p className="text-xs text-slate-500 mt-3 font-medium">Auto-calculated for {shortDate(selectedDateStr)}</p>
                            </div>

                            <div className="bg-white rounded-lg p-5 border-t-4 border-t-cyan-500 shadow-sm">
                                <div className="flex justify-between items-start">
                                    <div>
                                        <p className="text-xs font-bold text-slate-400 uppercase tracking-wider">Applied Daily Cons.</p>
                                        <h3 className="text-3xl font-black text-slate-800 mt-1">{currentDayState.consumption} <span className="text-sm font-semibold text-slate-500">Galons</span></h3>
                                    </div>
                                    <div className="bg-cyan-50 p-3 rounded-lg"><IconDroplet className="w-6 h-6 text-cyan-600" /></div>
                                </div>
                                <p className="text-xs text-slate-500 mt-3 font-medium">
                                    {currentDayState.isActual ? <span className="text-emerald-600 font-bold">Using Actual Input</span> : 'Using Standard Forecast'}
                                </p>
                            </div>

                            <div className={`bg-white rounded-lg p-5 border-t-4 ${currentRisk.border} shadow-sm`}>
                                <div className="flex justify-between items-start">
                                    <div>
                                        <p className="text-xs font-bold text-slate-400 uppercase tracking-wider">Remaining Days Coverage</p>
                                        <h3 className={`text-3xl font-black mt-1 ${currentRisk.text}`}>{Math.floor(currentDaysCoverSafe)} <span className="text-sm font-semibold opacity-75">Days</span></h3>
                                    </div>
                                    <div className={`${currentRisk.bg} p-3 rounded-lg`}><IconCalendar className={`w-6 h-6 ${currentRisk.text}`} /></div>
                                </div>
                                <p className="text-xs text-slate-500 mt-3 font-medium">Threshold: Red &lt;45 | Yel 45-60 | Grn &gt;60</p>
                            </div>

                            <div className="bg-white rounded-lg p-5 border-t-4 border-t-indigo-500 shadow-sm">
                                <div className="flex justify-between items-start">
                                    <div>
                                        <p className="text-xs font-bold text-slate-400 uppercase tracking-wider">Next Incoming Supply</p>
                                        {timelineStages.filter(s => new Date(s.date) >= new Date(selectedDateStr)).length > 0 ? (
                                            <>
                                                <h3 className="text-xl font-black text-indigo-700 mt-1">
                                                    +{timelineStages.filter(s => new Date(s.date) >= new Date(selectedDateStr))[0].volume.toLocaleString()} <span className="text-sm font-semibold text-slate-500">Galons</span>
                                                </h3>
                                                <p className="text-sm font-bold text-slate-800 mt-1">ETA: {shortDate(timelineStages.filter(s => new Date(s.date) >= new Date(selectedDateStr))[0].date)}</p>
                                            </>
                                        ) : (
                                            <h3 className="text-xl font-black text-slate-400 mt-1">No Future Shipments</h3>
                                        )}
                                    </div>
                                    <div className="bg-indigo-50 p-3 rounded-lg"><IconTruck className="w-6 h-6 text-indigo-600" /></div>
                                </div>
                            </div>
                        </div>

                        {/* SECTION: Management Summary & Gauge */}
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="lg:col-span-2 bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
                                <div className="bg-slate-50 border-b border-slate-200 px-5 py-3 font-bold text-slate-700 uppercase text-sm tracking-wider flex justify-between items-center">
                                    <span>Management Summary Panel</span>
                                    <button 
                                        onClick={handleGenerateAI} 
                                        disabled={isGeneratingAI || isLocalEnvironment}
                                        className={`flex items-center gap-1.5 text-white text-xs px-3 py-1.5 rounded shadow-sm transition-colors disabled:opacity-50 ${isLocalEnvironment ? 'bg-slate-500 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700'}`}
                                    >
                                        <IconSparkles className="w-4 h-4" />
                                        {isLocalEnvironment ? "AI Disabled Locally" : isGeneratingAI ? "Generating..." : "Generate AI Operations Brief"}
                                    </button>
                                </div>
                                <div className="p-6 flex-1 flex flex-col">
                                    <div className="text-slate-700 leading-relaxed space-y-4 text-lg">
                                        <p>
                                            Water consumption planning is based on the operational standard of <strong>{dailyConsumption} Galons (19L each) per day</strong> 
                                            ({scenario === 'Custom' ? 'Custom Scenario' : `${scenario}/POB Scenario`}). 
                                            With the current usable stock of <strong>{Math.floor(currentDayState.stock).toLocaleString()} Galons</strong>, 
                                            the site has approximately <strong className={currentRisk.text}>{Math.floor(currentDaysCoverSafe)} days</strong> of water coverage before the next scheduled deliveries.
                                        </p>
                                        
                                        {timelineStages.length > 0 && (
                                            <p className="text-sm text-slate-500 mt-2">
                                                The scheduled deliveries on {timelineStages.slice(0, 2).map(s => shortDate(s.date)).join(' and ')} will extend water coverage to approximately <strong>{Math.floor(timelineStages.length > 1 ? timelineStages[1].newDaysCover : timelineStages[0].newDaysCover)} days</strong>. 
                                                {timelineStages.length > 2 && ` After the final delivery on ${shortDate(timelineStages[timelineStages.length-1].date)}, the projected stock will support approximately ${Math.floor(timelineStages[timelineStages.length-1].newDaysCover)} days of camp operations.`}
                                            </p>
                                        )}
                                    </div>

                                    {/* AI Insights Section */}
                                    {(aiInsights || isGeneratingAI || aiError) && (
                                        <div className="mt-6 pt-6 border-t border-slate-200">
                                            <div className="flex items-center gap-2 mb-3">
                                                <IconSparkles className="w-5 h-5 text-indigo-600" />
                                                <h4 className="font-bold text-indigo-900 uppercase tracking-wide text-sm">Gemini AI Executive Brief</h4>
                                            </div>
                                            
                                            {isGeneratingAI && (
                                                <div className="w-full h-20 rounded-lg ai-shimmer border border-indigo-100"></div>
                                            )}
                                            
                                            {aiError && !isGeneratingAI && (
                                                <div className="p-4 bg-red-50 text-red-700 rounded-lg border border-red-200 text-sm">
                                                    {aiError}
                                                </div>
                                            )}

                                            {aiInsights && !isGeneratingAI && (
                                                <div className="p-5 bg-indigo-50 text-indigo-900 rounded-lg border border-indigo-200 shadow-inner">
                                                    <p className="italic font-medium leading-relaxed">"{aiInsights}"</p>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
                                <div className="bg-slate-50 border-b border-slate-200 px-5 py-3 font-bold text-slate-700 uppercase text-sm tracking-wider">
                                    Coverage Indicator
                                </div>
                                <div className="p-6 flex-1 flex flex-col justify-center items-center">
                                    <div className="relative w-48 h-24 mb-4">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <PieChart>
                                                <Pie
                                                    data={[{ value: Math.min(currentDaysCoverSafe, 100) }, { value: Math.max(100 - currentDaysCoverSafe, 0) }]}
                                                    cx="50%" cy="100%" startAngle={180} endAngle={0} innerRadius={60} outerRadius={80} dataKey="value" stroke="none"
                                                >
                                                    <Cell fill={currentRisk.hex} />
                                                    <Cell fill="#e2e8f0" />
                                                </Pie>
                                            </PieChart>
                                        </ResponsiveContainer>
                                        <div className="absolute inset-0 flex flex-col items-center justify-end pb-2">
                                            <span className={`text-4xl font-black ${currentRisk.text}`}>{Math.floor(currentDaysCoverSafe)}</span>
                                            <span className="text-xs font-bold text-slate-400 uppercase tracking-widest mt-1">Days</span>
                                        </div>
                                    </div>
                                    <div className="flex w-full justify-between text-[10px] font-bold text-slate-400 uppercase tracking-wider px-4">
                                        <span className="text-red-500">0 - 44</span>
                                        <span className="text-yellow-500">45 - 60</span>
                                        <span className="text-green-500">&gt; 60</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* SECTION: Actual Usage (Reference) & Forecast Charts */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            
                            {/* Actual Usage Reference Chart */}
                            <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                                <div className="bg-slate-50 border-b border-slate-200 px-5 py-3 flex justify-between items-center">
                                    <span className="font-bold text-slate-700 uppercase text-sm tracking-wider">Actual Daily Consumption</span>
                                    <span className="text-xs bg-slate-200 text-slate-600 font-bold px-2 py-1 rounded">Reference Data</span>
                                </div>
                                <div className="p-6 h-80 w-full relative">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={actualDailyUseDataState.filter(d => d.val !== null && d.val !== '')} margin={{ top: 20, right: 30, left: 0, bottom: 5 }}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                                            <XAxis dataKey="date" tickFormatter={shortDate} tick={{fill: '#64748b', fontSize: 11}} />
                                            <YAxis tick={{fill: '#64748b', fontSize: 11}} />
                                            <Tooltip 
                                                cursor={{fill: '#f1f5f9'}}
                                                contentStyle={{ backgroundColor: '#1e293b', borderRadius: '8px', border: 'none', color: '#fff' }}
                                                itemStyle={{ color: '#fff' }}
                                                labelFormatter={shortDate}
                                            />
                                            <Bar dataKey="val" name="Galons Issued" fill="#94a3b8" radius={[4, 4, 0, 0]}>
                                                <LabelList dataKey="val" position="top" style={{ fill: '#64748b', fontSize: 11, fontWeight: 'bold' }} />
                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>

                            {/* Stock Depletion & Shipment Impact Forecast */}
                            <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                                <div className="bg-slate-50 border-b border-slate-200 px-5 py-3 flex justify-between items-center">
                                    <span className="font-bold text-slate-700 uppercase text-sm tracking-wider">Stock Depletion Forecast</span>
                                    <span className="text-xs bg-indigo-100 text-indigo-700 font-bold px-2 py-1 rounded">Blended Logic (Act + Std)</span>
                                </div>
                                <div className="p-6 h-80 w-full relative">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <ComposedChart data={forecastData} margin={{ top: 20, right: 30, left: 0, bottom: 5 }}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                                            <XAxis dataKey="label" tick={{fill: '#64748b', fontSize: 11}} dy={10} minTickGap={20} />
                                            <YAxis yAxisId="left" tick={{fill: '#64748b', fontSize: 11}} />
                                            <YAxis yAxisId="right" orientation="right" hide />
                                            <Tooltip 
                                                contentStyle={{ backgroundColor: '#1e293b', borderRadius: '8px', border: 'none', color: '#fff' }}
                                                labelStyle={{ color: '#94a3b8', fontWeight: 'bold', marginBottom: '4px' }}
                                                formatter={(value, name) => [value, name === 'stock' ? 'End Stock (Galons)' : 'Incoming Shipment']}
                                            />
                                            
                                            <ReferenceLine yAxisId="left" x={shortDate(selectedDateStr)} stroke="#f59e0b" strokeWidth={2} strokeDasharray="3 3" label={{ position: 'top', value: 'Simulator Date', fill: '#f59e0b', fontSize: 11, fontWeight: 'bold' }} />
                                            
                                            <Area yAxisId="left" type="monotone" dataKey="stock" name="Projected Stock" stroke="#1f4e79" strokeWidth={3} fillOpacity={0.1} fill="#1f4e79" />
                                            <Bar yAxisId="right" dataKey="shipment" name="Shipment Arrival" fill="#10b981" barSize={15}>
                                                <LabelList dataKey="shipment" position="top" formatter={(val) => val > 0 ? `+${val}` : ''} style={{ fill: '#059669', fontSize: 10, fontWeight: 'bold' }} />
                                            </Bar>
                                        </ComposedChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>

                        </div>

                        {/* SECTION: Shipment Timeline Logic */}
                        <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                            <div className="bg-slate-50 border-b border-slate-200 px-5 py-3 font-bold text-slate-700 uppercase text-sm tracking-wider">
                                Shipment Timeline Logistics & Calculations
                            </div>
                            <div className="p-6">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {timelineStages.map((stage) => (
                                        <div key={stage.id} className="border border-indigo-100 bg-indigo-50/30 rounded-lg p-5 relative mt-3 md:mt-0">
                                            <div className="absolute -top-3 -left-3 w-8 h-8 bg-bp-blue text-white rounded-full flex items-center justify-center font-bold text-sm shadow">
                                                {stage.id}
                                            </div>
                                            <h4 className="text-lg font-black text-indigo-900 mt-2 mb-4 border-b border-indigo-100 pb-2">{displayDate(stage.date)}</h4>
                                            
                                            <div className="space-y-3 text-sm text-slate-700">
                                                <div className="flex justify-between">
                                                    <span>Days until shipment:</span>
                                                    <span className="font-semibold">{stage.gapDays} days</span>
                                                </div>
                                                <div className="flex justify-between text-red-600">
                                                    <span>Consumption in gap:</span>
                                                    <span className="font-semibold">-{stage.consumedPeriod.toLocaleString()} Galons</span>
                                                </div>
                                                <div className="flex justify-between">
                                                    <span>Stock before delivery:</span>
                                                    <span className="font-semibold">{stage.stockBefore.toLocaleString()} Galons</span>
                                                </div>
                                                <div className="flex justify-between items-center py-2 border-y border-indigo-100 my-2">
                                                    <span className="font-bold text-indigo-700">Incoming Volume:</span>
                                                    <span className="font-black text-lg text-indigo-600">+{stage.volume.toLocaleString()} Galons</span>
                                                </div>
                                                <div className="flex justify-between text-emerald-700">
                                                    <span>Stock after arrival:</span>
                                                    <span className="font-black">{stage.stockAfter.toLocaleString()} Galons</span>
                                                </div>
                                                <div className="flex justify-between bg-white p-2 rounded border border-indigo-100 mt-2 items-center">
                                                    <span className="font-bold text-slate-500 uppercase text-xs">New Days Cover</span>
                                                    <span className={`font-black ${getRiskLevel(stage.newDaysCover).text}`}>{Math.floor(stage.newDaysCover)} Days</span>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* SECTION: Editable Parameters & Cloud Saving */}
                        <div className="bg-slate-800 rounded-xl shadow-sm overflow-hidden text-white mb-10">
                            <div className="bg-slate-900 px-5 py-3 flex justify-between items-center border-b border-slate-700">
                                <div>
                                    <span className="font-bold uppercase text-sm tracking-wider text-slate-300 block">Operations Setup & Override Controls</span>
                                    <span className="text-xs font-normal text-slate-500 capitalize">Changes auto-recalculate instantly. Save to keep for future sessions.</span>
                                </div>
                                <button 
                                    onClick={handleSaveData}
                                    disabled={saveStatus === "saving"}
                                    className={`flex items-center gap-2 px-4 py-2 rounded text-sm font-bold shadow transition-colors ${
                                        saveStatus === 'saved' ? 'bg-emerald-600 text-white' : 
                                        saveStatus === 'error' ? 'bg-red-600 text-white' : 
                                        'bg-bp-blue hover:bg-blue-600 text-white'
                                    }`}
                                >
                                    <IconSave className="w-4 h-4" />
                                    {saveStatus === "idle" ? (isLocalEnvironment ? "Save Locally (Browser)" : "Save to Database") : saveStatus === "saving" ? "Saving..." : saveStatus === "saved" ? "Saved Successfully!" : "Error Saving"}
                                </button>
                            </div>
                            <div className="p-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
                                
                                {/* Base Parameters */}
                                <div className="space-y-4">
                                    <h4 className="text-indigo-300 font-bold border-b border-slate-700 pb-2">Base Parameters (As of {displayDate(baseDateStr)})</h4>
                                    <div>
                                        <label className="block text-xs uppercase text-slate-400 font-bold mb-1">Starting Usable Stock (Galons)</label>
                                        <input type="number" value={baseStock} onChange={(e) => setBaseStock(e.target.value)} className="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-white focus:outline-none focus:border-indigo-400" />
                                    </div>
                                    <div>
                                        <label className="block text-xs uppercase text-slate-400 font-bold mb-1">Standard Daily Consumption Rate (Galons/Day)</label>
                                        <input type="number" value={dailyConsumption} onChange={(e) => handleCustomConsumptionChange(e.target.value)} className="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-white focus:outline-none focus:border-indigo-400" />
                                    </div>
                                </div>

                                {/* Shipments Schedule */}
                                <div className="space-y-4">
                                    <h4 className="text-indigo-300 font-bold border-b border-slate-700 pb-2">Incoming Shipments Schedule</h4>
                                    {shipments.map((ship, index) => (
                                        <div key={ship.id} className="flex gap-3">
                                            <div className="flex-1">
                                                <label className="block text-xs uppercase text-slate-400 font-bold mb-1">Date</label>
                                                <input type="date" value={ship.date} onChange={(e) => {
                                                    const newShip = [...shipments];
                                                    newShip[index].date = e.target.value;
                                                    setShipments(newShip);
                                                }} className="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-white text-sm focus:outline-none focus:border-indigo-400" />
                                            </div>
                                            <div className="flex-1">
                                                <label className="block text-xs uppercase text-slate-400 font-bold mb-1">Total Vol (Galons)</label>
                                                <input type="number" value={ship.volume} onChange={(e) => {
                                                    const newShip = [...shipments];
                                                    newShip[index].volume = e.target.value;
                                                    setShipments(newShip);
                                                }} className="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-white focus:outline-none focus:border-indigo-400 text-sm font-bold text-emerald-400" />
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {/* Editable Actual Usage Data */}
                                <div className="space-y-4">
                                    <div className="flex justify-between items-center border-b border-slate-700 pb-2">
                                        <h4 className="text-indigo-300 font-bold">Edit Actual Daily Use (Ref)</h4>
                                        <button onClick={handleAddActualUsage} className="bg-indigo-600 hover:bg-indigo-500 text-white text-xs px-2 py-1 rounded transition-colors shadow-sm">+ Add Row</button>
                                    </div>
                                    <div className="max-h-[220px] overflow-y-auto pr-2 space-y-2 dark-scrollbar">
                                        {actualDailyUseDataState.map((item, index) => (
                                            <div key={item.id} className="flex gap-2 items-center">
                                                <input
                                                    type="date"
                                                    value={item.date}
                                                    onChange={(e) => handleActualUsageDateChange(index, e.target.value)}
                                                    className="w-32 bg-slate-700 border border-slate-600 rounded px-2 py-1 text-white text-xs font-bold focus:outline-none focus:border-indigo-400"
                                                />
                                                <input
                                                    type="number"
                                                    value={item.val}
                                                    onChange={(e) => handleActualUsageChange(index, e.target.value)}
                                                    className="flex-1 bg-slate-700 border border-slate-600 rounded px-2 py-1 text-white text-sm focus:outline-none focus:border-indigo-400"
                                                />
                                                <button onClick={() => handleRemoveActualUsage(index)} title="Remove row" className="text-slate-500 hover:text-red-400 font-bold px-2 py-1">✕</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
